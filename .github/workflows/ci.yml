name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install

      - name: Typecheck host
        run: pnpm --filter @earendil-works/gondolin exec tsc --noEmit

      - name: Build package artifacts
        run: pnpm --filter @earendil-works/gondolin run build

      - name: Verify packaged CLI runtime
        run: node host/dist/bin/gondolin.js --help >/dev/null

  build-guest:
    name: Build Guest (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact: gondolin-guest-x64
            zig-target: x86_64-linux-musl
          - arch: aarch64
            artifact: gondolin-guest-arm64
            zig-target: aarch64-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install Zig
        run: scripts/install-zig.sh 0.16.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lz4
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          pnpm install

      - name: Build guest binaries
        run: |
          cd guest
          zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.zig-target }}

      - name: Build guest image
        run: |
          NODE_BIN="$(node -p 'process.execPath')"
          cd guest
          ALPINE_ARCH=${{ matrix.arch }} \
            GONDOLIN_SANDBOX_HELPERS_DIR="$PWD/zig-out" \
            make build NODE="$NODE_BIN"

      - name: Package assets
        run: |
          cd guest/image/out
          tar -czvf ../../../${{ matrix.artifact }}.tar.gz \
            manifest.json vmlinuz-virt firecracker-kernel \
            initramfs.cpio.lz4 rootfs.ext4

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 7

  container-build:
    name: Container Build
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install Zig
        run: scripts/install-zig.sh 0.16.0

      - run: pnpm install

      - name: Build guest binaries
        run: |
          cd guest
          zig build -Doptimize=ReleaseSmall

      - run: docker info

      - name: Smoke test container build
        timeout-minutes: 15
        run: |
          cat > build-config-container-smoke.json <<'JSON'
          {
            "arch": "x86_64",
            "distro": "alpine",
            "alpine": {
              "version": "3.23.0",
              "kernelPackage": "linux-virt",
              "kernelImage": "vmlinuz-virt",
              "rootfsPackages": ["linux-virt"],
              "initramfsPackages": []
            },
            "container": {
              "force": true,
              "image": "alpine:3.23",
              "runtime": "docker"
            },
            "sandboxdPath": "./guest/zig-out/bin/sandboxd",
            "sandboxfsPath": "./guest/zig-out/bin/sandboxfs",
            "sandboxsshPath": "./guest/zig-out/bin/sandboxssh",
            "sandboxingressPath": "./guest/zig-out/bin/sandboxingress"
          }
          JSON

          node host/bin/gondolin.ts build \
            --config build-config-container-smoke.json \
            --output ./tmp-container-assets \
            --quiet

          test -f ./tmp-container-assets/manifest.json
          test -s ./tmp-container-assets/vmlinuz-virt
          test -s ./tmp-container-assets/firecracker-kernel
          test -s ./tmp-container-assets/initramfs.cpio.lz4
          test -s ./tmp-container-assets/rootfs.ext4

  test:
    name: Test
    needs: [check, build-guest]
    runs-on: ubuntu-latest
    env:
      FIRECRACKER_VERSION: "1.16.0"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - uses: actions/download-artifact@v4
        with:
          name: gondolin-guest-x64
          path: .

      - name: Extract guest assets
        run: |
          mkdir -p guest/image/out
          tar -xzvf gondolin-guest-x64.tar.gz -C guest/image/out
          touch guest/image/out/*

      - name: Install Zig and system dependencies
        run: |
          scripts/install-zig.sh 0.16.0
          sudo apt-get update
          sudo apt-get install -y lz4
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Firecracker
        run: |
          curl -fsSL \
            "https://github.com/firecracker-microvm/firecracker/releases/download/v${FIRECRACKER_VERSION}/firecracker-v${FIRECRACKER_VERSION}-x86_64.tgz" \
            -o /tmp/firecracker.tgz
          tar -xzf /tmp/firecracker.tgz -C /tmp
          sudo install -m 0755 \
            "/tmp/release-v${FIRECRACKER_VERSION}-x86_64/firecracker-v${FIRECRACKER_VERSION}-x86_64" \
            /usr/local/bin/firecracker
          firecracker --version

      - name: Enable KVM
        run: sudo chown "$(id -u)" /dev/kvm

      - run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run tests
        timeout-minutes: 20
        run: |
          NODE_BIN="$(node -p 'process.execPath')"
          make -C guest test NODE="$NODE_BIN"
          make -C host test NODE="$NODE_BIN"
        env:
          GONDOLIN_GUEST_DIR: ${{ github.workspace }}/guest/image/out
          GONDOLIN_RUNTIME_DIR: /tmp/gondolin
          WS_TIMEOUT: "120000"
