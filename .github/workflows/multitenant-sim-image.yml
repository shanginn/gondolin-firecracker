name: Multitenant Simulator Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container tag (for example sim-20260626-1)"
        required: true
        type: string
      source_ref:
        description: "Git ref to build from (branch/tag/sha)"
        required: false
        type: string

jobs:
  publish:
    name: Build and publish simulator image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve source ref
        id: source
        run: |
          SOURCE_REF="${{ inputs.source_ref }}"
          if [ -z "$SOURCE_REF" ]; then
            SOURCE_REF="${GITHUB_SHA}"
          fi
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.source_ref }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: examples/multitenant-sim/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gondolin-user-sim:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository }}/gondolin-user-sim:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.source_ref }}
