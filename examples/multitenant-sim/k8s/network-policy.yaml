apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gondolin-user-sim
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gondolin-user-sim
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: TCP
          port: 443
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
