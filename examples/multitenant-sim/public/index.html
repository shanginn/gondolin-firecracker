<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gondolin Testing Grounds</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Testing Grounds</h1>
        <p>Tiny VM sessions, shown as a live arena</p>
      </div>
      <div class="top-pills">
        <span id="streamStatus" class="pill off">connecting</span>
        <span id="runState" class="pill">paused</span>
      </div>
    </header>

    <main class="app">
      <section class="hero">
        <div class="hero-actions">
          <button id="startBtn" class="go">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn" class="danger">Reset</button>
        </div>

        <div class="world" aria-label="Live testing ground">
          <div class="sun"></div>
          <div class="track">
            <section class="zone zone-queued">
              <span>Queue</span>
              <strong id="zoneQueued">0</strong>
              <div id="queueTokens" class="token-row"></div>
            </section>
            <section class="zone zone-active">
              <span>Boot + Run</span>
              <strong id="zoneActive">0</strong>
              <div id="activeTokens" class="token-row"></div>
            </section>
            <section class="zone zone-hot">
              <span>Hot</span>
              <strong id="zoneHot">0</strong>
              <div id="hotTokens" class="token-row"></div>
            </section>
            <section class="zone zone-warm">
              <span>Saved</span>
              <strong id="zoneWarm">0</strong>
              <div id="warmTokens" class="token-row"></div>
            </section>
          </div>
          <div class="ground">
            <div class="gate"></div>
            <div class="gate"></div>
            <div class="gate"></div>
          </div>
        </div>

        <div class="big-stats">
          <article>
            <span>Done</span>
            <strong id="doneText">0</strong>
          </article>
          <article>
            <span>Wait</span>
            <strong id="waitText">0</strong>
          </article>
          <article>
            <span>VMs</span>
            <strong id="vmText">0/0</strong>
          </article>
          <article>
            <span>Memory</span>
            <strong id="memoryText">0 B</strong>
          </article>
        </div>
      </section>

      <section class="controls-card">
        <div class="section-head">
          <div>
            <h2>Scenario knobs</h2>
            <p id="saveStatus">Move sliders. Changes apply live.</p>
          </div>
          <button id="burstBtn" class="accent">Burst</button>
        </div>

        <div class="presets">
          <button data-preset="demo">Demo</button>
          <button data-preset="rush">Rush</button>
          <button data-preset="save">Save RAM</button>
          <button data-preset="cold">Cold Race</button>
        </div>

        <form id="configForm" class="sliders">
          <fieldset>
            <legend>Strategy</legend>
            <div class="segmented" id="strategyButtons">
              <button type="button" data-strategy="hybrid">Hybrid</button>
              <button type="button" data-strategy="hot">Hot</button>
              <button type="button" data-strategy="warm-snapshot">Saved</button>
              <button type="button" data-strategy="cold">Cold</button>
            </div>
            <select name="strategy" hidden>
              <option value="cold">cold</option>
              <option value="hot">hot</option>
              <option value="warm-snapshot">warm-snapshot</option>
              <option value="hybrid">hybrid</option>
            </select>
          </fieldset>

          <label class="slider">
            <span>Users in the world</span>
            <output id="targetUsersOut">100</output>
            <input
              name="targetUsers"
              type="range"
              min="1"
              max="5000"
              step="1"
              data-live
            />
          </label>

          <label class="slider">
            <span>Traffic</span>
            <output id="arrivalRatePerSecOut">0 / sec</output>
            <input
              name="arrivalRatePerSec"
              type="range"
              min="0"
              max="50"
              step="0.1"
              data-live
            />
          </label>

          <label class="slider">
            <span>VM slots</span>
            <output id="maxActiveVmsOut">2</output>
            <input
              name="maxActiveVms"
              type="range"
              min="1"
              max="64"
              step="1"
              data-live
            />
          </label>

          <label class="slider">
            <span>Boot gates</span>
            <output id="bootConcurrencyOut">1</output>
            <input
              name="bootConcurrency"
              type="range"
              min="1"
              max="32"
              step="1"
              data-live
            />
          </label>

          <label class="slider">
            <span>CPU work per task</span>
            <output id="taskCpuIterationsOut">20000</output>
            <input
              name="taskCpuIterations"
              type="range"
              min="0"
              max="200000"
              step="1000"
              data-live
            />
          </label>

          <label class="select-row">
            <span>VM memory</span>
            <select name="vmMemory" data-live>
              <option value="30M">30M tiny</option>
              <option value="50M">50M safer</option>
              <option value="84M">84M default</option>
              <option value="128M">128M roomy</option>
            </select>
          </label>

          <label class="switch-row">
            <span>Network fetch</span>
            <input name="networkEnabled" type="checkbox" data-live />
          </label>

          <details class="advanced">
            <summary>Advanced</summary>
            <div class="advanced-grid">
              <label>
                Hot TTL ms
                <input name="hotIdleTtlMs" type="number" min="0" step="1000" />
              </label>
              <label>
                Save TTL ms
                <input name="warmSnapshotTtlMs" type="number" min="0" step="1000" />
              </label>
              <label>
                Timeout ms
                <input name="vmStartTimeoutMs" type="number" min="1" step="1" />
              </label>
              <label>
                Burst size
                <input id="burstCount" type="number" min="1" value="10" />
              </label>
              <label>
                Image path
                <input name="imagePath" type="text" />
              </label>
              <label>
                Work path
                <input name="workDir" type="text" />
              </label>
            </div>
            <button id="applyConfigBtn" type="submit">Apply advanced</button>
          </details>
        </form>
      </section>

      <section class="report-card">
        <div class="section-head">
          <div>
            <h2>Run report</h2>
            <p id="reportSummary">Run a scenario, then copy this back for analysis.</p>
          </div>
          <div class="report-actions">
            <button id="copyReportBtn">Copy</button>
            <button id="downloadReportBtn">Download</button>
          </div>
        </div>
        <textarea id="reportText" readonly></textarea>
      </section>

      <section class="details-grid">
        <article class="mini-card">
          <h2>Health</h2>
          <div class="meters">
            <label>
              Slot pressure
              <span id="slotText">0%</span>
              <i><b id="slotBar"></b></i>
            </label>
            <label>
              Queue heat
              <span id="queueText">0%</span>
              <i><b id="queueBar"></b></i>
            </label>
            <label>
              Host free
              <span id="hostText">0 B</span>
              <i><b id="hostBar"></b></i>
            </label>
          </div>
        </article>

        <article class="mini-card">
          <h2>Events</h2>
          <ol id="eventsList" class="events"></ol>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
